packages:
  - 'packages/*'
  - 'docs'
  - 'apps/*'

# Security: Only install packages that are at least 24 hours old (1440 minutes)
# This helps protect against typosquatting and malicious packages
minimumReleaseAge: 1440

# Exclude trusted packages from age restriction
minimumReleaseAgeExclude:
  - '@zerodev/*'
